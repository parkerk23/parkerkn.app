<!DOCTYPE html>
<html>
  <head>
    <title>My Website</title>
    <style>
      .header {
        background-image: url('/public/images/header-background.jpg');
        height: 500px;
        background-size: cover;
        background-position: center;
        position: relative;
      }
      .header h1 {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 50px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Welcome to my website</h1>
    </div>
  </body>
</html>
